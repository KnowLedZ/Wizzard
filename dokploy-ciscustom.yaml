#cloud-config
package_update: false
package_upgrade: false

write_files:
  - path: /root/setup-vm.sh
    permissions: '0755'
    encoding: b64
    content: |
      BASE64_CODE_DOKPLOY-SETUP.SH
      
  - path: /etc/profile.d/dokploy-first-login.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      [ "$USER" != "root" ] && return
      [ -f /root/.dokploy_installed ] && return

      clear
      echo "======================================"
      echo "   DOKPLOY FIRST LOGIN INSTALLER"
      echo "======================================"
      echo ""
      echo "[INFO] Menjalankan installer..."
      echo ""

      bash /root/setup-vm.sh
      STATUS=$?

      if [ $STATUS -ne 0 ]; then
          echo "[ERROR] Installer gagal!"
          return
      fi

      echo ""
      echo "[INFO] Verifikasi service dokploy..."
      for i in {1..60}; do
          RUNNING=$(ps aux | grep 'dokploy' | grep -v grep)
          if [ -n "$RUNNING" ]; then
              echo "[OK] dokploy sudah running"
              break
          fi
          echo "[WAIT] dokploy belum ready ($i/60)"
          sleep 2
      done

      if ! ss -lnt | grep -q ":3000"; then
          echo "[WARNING] Port 3000 belum terbuka!"
          return
      fi

      touch /root/.dokploy_installed
      rm -f /root/setup-vm.sh

      echo ""
      echo "[INFO] Installation Dokploy finished"
