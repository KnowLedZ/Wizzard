#cloud-config
package_update: false
package_upgrade: false

write_files:
  - path: /root/setup-vm.sh
    permissions: '0755'
    encoding: b64
    content: |
      BASE64_CODE_DOCKER-SETUP.SH

  - path: /etc/profile.d/docker-first-login.sh
    permissions: '0755'
    content: |
      #!/bin/bash

      [ "$USER" != "root" ] && return
      [ -f /root/.docker_installed ] && return

      clear
      echo "======================================"
      echo "      DOCKER FIRST LOGIN INSTALLER"
      echo "======================================"
      echo ""

      echo "[INFO] Menjalankan installer..."

      # 🚨 BLOCKING (WAJIB)
      bash /root/setup-vm.sh
      STATUS=$?

      if [ $STATUS -ne 0 ]; then
          echo "[ERROR] Installer gagal!"
          echo "[INFO] Cek log di /var/log/"
          return
      fi

      # =========================
      # WAIT PANEL READY (Docker)
      # =========================
      echo ""
      for i in {1..60}; do
          if systemctl is-active docker.service >/dev/null 2>&1; then
            echo "[OK] Docker service sudah running"
            break
          fi
          echo "[WAIT] Docker belum ready ($i/60)"
          sleep 2
      done

      # ✅ MARK DONE (SETELAH BENAR2 SELESAI)
      touch /root/.docker_installed

      # ✅ CLEANUP DI AKHIR (INI YANG SEBELUMNYA SALAH POSISI)
      rm -f /root/setup-vm.sh
      rm -f /root/get-docker.sh

      echo ""
      echo "[INFO] Installation docker finished"
