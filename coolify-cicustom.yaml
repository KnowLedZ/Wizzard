#cloud-config
package_update: false
package_upgrade: false

write_files:
  # =========================
  # MAIN INSTALL SCRIPT (BASE64)
  # =========================
  - path: /root/setup-vm.sh
    permissions: '0755'
    encoding: b64
    content: |
      BASE64_CODE_COOLIFY-SETUP.SH

  # =========================
  # FIRST LOGIN TRIGGER
  # =========================
  - path: /etc/profile.d/coolify-first-login.sh
    permissions: '0755'
    content: |
      #!/bin/bash

      # =========================
      # ONLY ROOT + INTERACTIVE
      # =========================
      [ "$USER" != "root" ] && return
      [[ $- != *i* ]] && return

      # =========================
      # PREVENT RE-RUN
      # =========================
      if [ -f /root/.coolify_installed ]; then
          return
      fi

      clear
      echo "======================================"
      echo "   COOLIFY FIRST LOGIN INSTALLER"
      echo "======================================"
      echo ""
      echo "[INFO] Menjalankan installer..."
      echo ""

      # =========================
      # RUN INSTALLER
      # =========================
      bash /root/setup-vm.sh
      STATUS=$?

      if [ $STATUS -ne 0 ]; then
          echo "[ERROR] Installer gagal!"
          return
      fi
      
      for i in {1..60}; do
          RUNNING=$(docker ps --format '{{.Names}}' | grep -c coolify || true)

          if [ "$RUNNING" -ge 1 ]; then
              echo ""
              echo "[OK] Coolify sudah running"
              break
          fi

          echo ""
          echo "[WAIT] Coolify belum ready ($i/60)"
          sleep 2
      done

      if ! ss -lnt | grep -q ":8000"; then
          echo "[WARNING] Port 8000 belum terbuka!"
          return
      fi

      # =========================
      # MARK AS DONE
      # =========================
      touch /root/.coolify_installed

      # =========================
      # SELF DESTRUCT 🔥
      # =========================
      rm -f /etc/profile.d/coolify-first-login.sh
      rm -f /root/setup-vm.sh

      echo ""
      echo "[INFO] Installation Coolify finished"
